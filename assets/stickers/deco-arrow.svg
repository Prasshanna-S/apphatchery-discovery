<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" width="140" height="90" role="img" aria-label="Hand-drawn drag arrow">
  <title>deco-arrow — drag here</title>
  <!-- curved hand-drawn "drag this way" arrow -->
  <path d="M14 22 C40 10 86 12 114 44"
        fill="none" stroke="#105194" stroke-width="5" stroke-linecap="round"/>
  <!-- arrowhead -->
  <path d="M100 30 L118 47 L96 56"
        fill="none" stroke="#105194" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- orange motion ticks at the tail -->
  <path d="M10 34 l-6 4 M16 42 l-7 2" stroke="#F59A2C" stroke-width="4" stroke-linecap="round"/>
</svg>
