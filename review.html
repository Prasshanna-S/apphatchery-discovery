<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AppHatchery — Intake review</title>
  <style>
    body { font-family: Geist, system-ui, -apple-system, sans-serif; max-width: 840px; margin: 0 auto; padding: 40px 20px; color: #16181c; background: #f1efe8; }
    h1 { font-family: Georgia, "Times New Roman", serif; font-size: 1.8rem; margin: 0 0 4px; }
    .sub { font: 12px/1.5 ui-monospace, monospace; color: #6b7180; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 24px; }
    .doc { background: #fff; border: 1px solid #e4e1d8; border-radius: 12px; padding: 18px 22px; margin: 16px 0; box-shadow: 0 4px 14px rgba(16,38,64,.06); }
    .meta { font: 11px/1.6 ui-monospace, monospace; color: #6b7180; margin-bottom: 10px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; background: #105194; color: #fff; font-size: 10px; margin-right: 6px; }
    .tag--sent { background: #1f8f4e; } .tag--unsent { background: #b07; }
    pre { white-space: pre-wrap; font: 14px/1.55 Geist, sans-serif; margin: 0; }
    .empty { color: #6b7180; }
  </style>
</head>
<body>
  <h1>Intake review</h1>
  <p class="sub">AI-generated intake reports + records · auto-refreshes every 5s</p>
  <div id="list"><p class="empty">Loading…</p></div>
  <script>
    const esc = s => String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    async function load() {
      let docs = [];
      try { docs = await (await fetch("/api/docs")).json(); } catch (_) {}
      const el = document.getElementById("list");
      if (!docs.length) { el.innerHTML = '<p class="empty">No intake reports yet. Finish a “Talk to us” conversation, or submit the intake form.</p>'; return; }
      el.innerHTML = docs.map(d => {
        const tags = [];
        if (d.synthesized) tags.push('<span class="tag">AI report</span>');
        if (d.email) tags.push(`<span class="tag ${d.email.ok ? "tag--sent" : "tag--unsent"}">${d.email.ok ? "emailed → " + (d.emailedTo || "") : "not emailed"}</span>`);
        return `<div class="doc"><div class="meta">${tags.join("")} ${esc(d.file || "")} · ${esc(d.at || "")}</div>${d.document ? `<pre>${esc(d.document)}</pre>` : `<pre>${esc(JSON.stringify(d, null, 2))}</pre>`}</div>`;
      }).join("");
    }
    load(); setInterval(load, 5000);
  </script>
</body>
</html>
